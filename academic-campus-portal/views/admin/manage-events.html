<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Events - Campus Event Portal</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100%;
            width: 250px;
            background: #2c3e50;
            padding: 2rem 1rem;
        }
        .sidebar-menu {
            list-style: none;
        }
        .sidebar-menu li {
            margin-bottom: 0.5rem;
        }
        .sidebar-menu a {
            display: block;
            padding: 0.75rem 1rem;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
        }
        .sidebar-menu a:hover, .sidebar-menu a.active {
            background: #3498db;
        }
        .main-content {
            margin-left: 250px;
            padding: 2rem;
        }
        .event-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .event-card {
            background: white;
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .event-card h3 {
            margin-top: 0;
            color: #2c3e50;
        }
        .event-meta {
            color: #666;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }
        .event-actions {
            margin-top: 1rem;
            display: flex;
            gap: 0.5rem;
        }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .status-badge.active {
            background: #d4edda;
            color: #155724;
        }
        .status-badge.cancelled {
            background: #f8d7da;
            color: #721c24;
        }
        .status-badge.completed {
            background: #cce5ff;
            color: #004085;
        }
    </style>
</head>
<body>
    <nav class="navbar" style="position: fixed; width: 100%; top: 0; z-index: 100; margin-left: 250px;">
        <span style="font-size: 1.25rem;">Manage Events</span>
        <div class="navbar-links">
            <a href="#" onclick="logout()">Logout</a>
        </div>
    </nav>

    <div class="sidebar">
        <h2 style="color: white; margin-bottom: 2rem; text-align: center;">Admin Panel</h2>
        <ul class="sidebar-menu">
            <li><a href="/admin/dashboard">Dashboard</a></li>
            <li><a href="/admin/events" class="active">Manage Events</a></li>
            <li><a href="/admin/registrations">View Registrations</a></li>
            <li><a href="/admin/payment-settings">Payment Settings</a></li>
            <li><a href="/">Back to Home</a></li>
        </ul>
    </div>

    <div class="main-content" style="margin-top: 80px;">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Events</h2>
                <button class="btn btn-primary" onclick="openModal('eventModal')">+ Add New Event</button>
            </div>
            
            <div id="eventsContainer" class="event-grid">
                <div class="loading"><div class="spinner"></div></div>
            </div>
        </div>
    </div>

    <!-- Event Modal -->
    <div id="eventModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="eventModalTitle">Add New Event</h3>
                <span class="close" onclick="closeModal('eventModal')">&times;</span>
            </div>
            <form id="eventForm">
                <input type="hidden" id="eventId">
                <div class="form-group">
                    <label>Event Title *</label>
                    <input type="text" id="eventTitle" required>
                </div>
                <div class="form-group">
                    <label>Description</label>
                    <textarea id="eventDescription" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Event Type</label>
                        <select id="eventType">
                            <option value="Academic">Academic</option>
                            <option value="Sports">Sports</option>
                            <option value="Cultural">Cultural</option>
                            <option value="Technical">Technical</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="eventLocation">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Event Date *</label>
                        <input type="date" id="eventDate" required>
                    </div>
                    <div class="form-group">
                        <label>Event Time *</label>
                        <input type="time" id="eventTime" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Registration Deadline</label>
                        <input type="date" id="eventDeadline">
                    </div>
                    <div class="form-group">
                        <label>Max Participants</label>
                        <input type="number" id="eventMaxParticipants" min="1">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Fee per Person (Rs.)</label>
                        <input type="number" id="eventFee" min="0" value="0">
                    </div>
                    <div class="form-group">
                        <label>Is Team Event?</label>
                        <select id="eventIsTeam">
                            <option value="0">No - Individual</option>
                            <option value="1">Yes - Team</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="teamSizeGroup" style="display: none;">
                    <label>Max Team Size</label>
                    <input type="number" id="eventMaxTeamSize" min="2" value="4">
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="eventStatus">
                        <option value="active">Active</option>
                        <option value="cancelled">Cancelled</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Save Event</button>
                    <button type="button" class="btn" onclick="closeModal('eventModal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/main.js"></script>
    <script src="/js/admin.js"></script>
    <script>
        // Toggle team size field
        document.getElementById('eventIsTeam').addEventListener('change', function() {
            document.getElementById('teamSizeGroup').style.display = 
                this.value === '1' ? 'block' : 'none';
        });
        
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await checkAuth();
            if (!user || user.role !== 'admin') {
                window.location.href = '/admin/login';
                return;
            }
            loadEvents();
        });
    </script>
</body>
</html>
